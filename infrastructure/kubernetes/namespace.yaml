apiVersion: v1
kind: Namespace
metadata:
  name: platform
  labels:
    name: platform
---
# Auth secrets (use Sealed Secrets or External Secrets in production)
apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  namespace: platform
type: Opaque
stringData:
  database-url: "postgres://auth:secret@auth-postgres:5432/authdb?sslmode=disable"
  redis-url: "redis://redis:6379"
  jwt-secret: "change-me-in-production-use-a-real-secret"
---
apiVersion: v1
kind: Secret
metadata:
  name: user-secrets
  namespace: platform
type: Opaque
stringData:
  database-url: "postgres://user:secret@user-postgres:5432/userdb?sslmode=disable"
---
apiVersion: v1
kind: Secret
metadata:
  name: order-secrets
  namespace: platform
type: Opaque
stringData:
  database-url: "postgres://order:secret@order-postgres:5432/orderdb?sslmode=disable"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: platform
data:
  AUTH_SERVICE_GRPC: "auth-service:9090"
  USER_SERVICE_URL: "http://user-service:8081"
  ORDER_SERVICE_URL: "http://order-service:8082"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8083"
  LOG_LEVEL: "info"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
# updated
